<h1>Gmaker</h1>
Game Maker
A python tkinter game maker.
<h2>Installation</h2>
<ol>
  <li>Click <a href="https://github.com/ytg120/GMaker/releases/latest">here</a></li>
  <li>Click <em>Assets</em> and install the .zip file(Windows 64bit supported.)</li>
  <li>Extract the .zip file.</li>
  <li>Run the <em>main.exe</em> file</li>
</ol>
